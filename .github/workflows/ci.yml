name: QA Pipeline - Validacao Estatica

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-e2e:
    name: Validar Sintaxe E2E (TypeScript)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Instalar dependências
      working-directory: ./e2e-tests
      run: npm install

    - name: Validar compilação do TypeScript
      working-directory: ./e2e-tests
      run: npx -p typescript tsc --noEmit